name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: python -m pip install -e ".[test]"

      - name: Run tests
        run: pytest -q

      - name: Smoke-test CLI gate
        run: |
          printf 'step,loss\n' > /tmp/div.csv
          python - <<'PY' >> /tmp/div.csv
          for k in range(20):
              print(f"{k},{0.2 * 1.18**k:.6f}")
          PY
          # A diverging loop must make the gate exit non-zero.
          if lyapwatch run /tmp/div.csv --min loss --final; then
            echo "expected non-zero exit on diverging loop" && exit 1
          fi
